<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            setInterval(function() {
                try {
                    // Lấy thẳng từ cái lệnh bạn vừa gõ ra số 5
                    var list = player.getById('rootPlayer').mainPlayList;
                    var index = list.get('selectedIndex');
                    var sceneName = list.get('items')[index].get('media').get('name');

                    if (sceneName && sceneName !== window.lastScene) {
                        window.lastScene = sceneName;
                        // Dùng dấu # để URL nhảy ngay lập tức mà không bị lỗi 404
                        window.location.hash = "scene=" + sceneName;
                    }
                } catch (e) {}
            }, 1000);
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    </style>
</head>
<body onload="loadTour()">
    <div id="viewer"></div>
</body>
</html>
