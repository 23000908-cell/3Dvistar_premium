<!DOCTYPE html>
<html>
<head>
    <title>Untitled 1</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />

    <script src="lib/tdvplayer.js?v=1773937233406"></script>

    <script type="text/javascript">
        var player;

        function loadTour()
        {
            if(player) return;

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');

            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            player.bindOnObject('rootPlayer', 'start', function(){

                var queryDict = {};
                location.search.substr(1).split("&").forEach(function(item) {
                    if (!item) return;
                    var k = item.split("=")[0];
                    var v = decodeURIComponent(item.split("=")[1]);
                    queryDict[k] = v;
                });

                var root = player.getById('rootPlayer');

                // 🔥 SỬA DUY NHẤT Ở ĐÂY
                if ("scene" in queryDict) {
                    var index = parseInt(queryDict["scene"]) - 1;
                    if (!isNaN(index)) {
                        root.setMainMediaByIndex(index);
                        return;
                    }
                }

                // fallback gốc
                if ("media-index" in queryDict) {
                    root.setMainMediaByIndex(parseInt(queryDict["media-index"]) - 1);
                } else if ("media-name" in queryDict) {
                    root.setMainMediaByName(queryDict["media-name"]);
                } else {
                    root.setMainMediaByIndex(0);
                }

            });
        }

        function onLoad() {
            loadTour();
        }
    </script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }
        #viewer {
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body onload="onLoad()">
    <div id="viewer"></div>
</body>
</html>
