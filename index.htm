<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            player.bindOnObject('rootPlayer', 'start', function(e){
                document.getElementById('debug').innerHTML = "Code đã chạy! Đang quét cảnh...";
                var lastMediaName = "";
                
                // Đồng bộ URL khi đổi cảnh
                setInterval(function() {
                    try {
                        var rp = player.getById('rootPlayer');
                        var media = rp.get('mainMedia').get('media');
                        var name = media.get('label') || media.get('name');
                        if (name && name !== lastMediaName) {
                            lastMediaName = name;
                            var newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?media-name=' + encodeURIComponent(name);
                            window.history.replaceState(null, '', newUrl);
                            document.getElementById('debug').innerHTML = "Đang ở cảnh: " + name;
                        }
                    } catch (err) {}
                }, 1000);
            }, player, false);
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        #debug { position: fixed; top: 10px; left: 10px; color: #00ff00; background: rgba(0,0,0,0.7); padding: 5px; z-index: 9999; font-family: monospace; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body onload="loadTour()">
    <div id="debug">Đang chờ Tour khởi động...</div>
    <div id="viewer"></div>
</body>
</html>
