<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        // BẢO MẬT: CHẶN CHUỘT PHẢI
        document.addEventListener('contextmenu', event => event.preventDefault());

        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);
            
            // Tự động nhảy cảnh từ URL nếu có
            player.bindOnObject('rootPlayer', 'start', function() {
                var rp = player.getById('rootPlayer');
                var list = rp.mainPlayList;
                var hash = window.location.hash;
                if (hash.indexOf('#scene=') !== -1) {
                    var targetScene = decodeURIComponent(hash.replace('#scene=', ''));
                    var items = list.get('items');
                    for (var i = 0; i < items.length; i++) {
                        var media = items[i].get('media');
                        if (media.get('name') === targetScene || media.get('label') === targetScene) {
                            list.set('selectedIndex', i); 
                            break;
                        }
                    }
                }
            });
        }
    </script>
    <style type="text/css">
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #000; 
            -webkit-user-select: none; user-select: none;
        }

        #viewer { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; z-index: 1;
            /* Tạo lề ảo cực mỏng để ép 3DVista không dán chữ sát mép */
            box-sizing: border-box;
            padding: 10px; 
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body onload="loadTour()">
    <div id="viewer"></div>
</body>
</html>
