<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            // Thêm tùy chọn để tránh lỗi Canvas readback
            settings.set(TDV.PlayerSettings.WEBGL_OPTIONS, {preserveDrawingBuffer: true});
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // Chỉ quét URL khi hệ thống đã ổn định hoàn toàn
            setTimeout(function() {
                setInterval(function() {
                    try {
                        var rp = player.getById('rootPlayer');
                        var pano = rp.get('MainviewerPanoramaPlayer');
                        var name = pano.get('currentMedia').get('media').get('name');
                        if (name && name !== window.lastScene) {
                            window.lastScene = name;
                            var newUrl = window.location.origin + window.location.pathname + '?scene=' + encodeURIComponent(name);
                            window.history.replaceState(null, '', newUrl);
                        }
                    } catch (e) {}
                }, 3000);
            }, 5000);
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    </style>
</head>
<body onload="loadTour()">
    <div id="viewer"></div>
</body>
</html>
