<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage: Digital Art</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0, width=device-width, viewport-fit=cover" />
    
    <script src="lib/tdvplayer.js?v=1774339490840"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774339490840');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1774339490840');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // LOGIC NHẢY LINK VÀ ĐỌC LINK (ĐÃ TỐI ƯU)
            player.bindOnObject('rootPlayer', 'start', function() {
                var rp = player.getById('rootPlayer');
                var list = rp.mainPlayList;
                
                // 1. Đọc link khi vừa mở trang
                var hash = window.location.hash;
                if (hash.indexOf('#scene=') !== -1) {
                    var targetScene = decodeURIComponent(hash.replace('#scene=', ''));
                    var items = list.get('items');
                    for (var i = 0; i < items.length; i++) {
                        var media = items[i].get('media');
                        if (media.get('name') === targetScene || media.get('label') === targetScene) {
                            list.set('selectedIndex', i); 
                            break;
                        }
                    }
                }

                // 2. Cập nhật link khi chuyển cảnh
                setInterval(function() {
                    try {
                        var idx = list.get('selectedIndex');
                        var currentMedia = list.get('items')[idx].get('media');
                        var sceneName = currentMedia.get('name') || currentMedia.get('label');
                        if (sceneName && sceneName !== window.lastScene) {
                            window.lastScene = sceneName;
                            window.location.hash = "scene=" + encodeURIComponent(sceneName);
                        }
                    } catch (e) {}
                }, 1000);
            });
        }

        // Đảm bảo tour load mượt trên cả mobile/desktop
        function onLoad() {
            loadTour();
        }
    </script>
    <style type="text/css">
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #000; 
        }
        #viewer { 
            position: absolute; 
            /* SỬA LỖI MẤT CHỮ: Dùng vùng an toàn thay vì pixel cứng */
            top: env(safe-area-inset-top);
            bottom: env(safe-area-inset-bottom);
            left: env(safe-area-inset-left);
            right: env(safe-area-inset-right);
            width: 100%; 
            height: 100%;
            z-index: 1;
        }
        /* Ép nội dung tour luôn nằm trong khung hình */
        canvas {
            object-fit: contain !important;
        }
    </style>
    <link rel="stylesheet" href="fonts.css?v=1774339490840">
</head>
<body onload="onLoad()">
    <div id="viewer"></div>
</body>
</html>
