<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // Bộ quét thông minh không gây lỗi hệ thống
            setInterval(function() {
                try {
                    var sceneName = "";
                    // Cách 1: Thử tìm trong hệ thống quản lý cảnh
                    if (typeof player.getById === 'function') {
                        var rp = player.getById('rootPlayer');
                        if (rp && typeof rp.get === 'function') {
                            var pano = rp.get('MainviewerPanoramaPlayer');
                            if (pano) {
                                sceneName = pano.get('currentMedia').get('media').get('name');
                            }
                        }
                    }

                    // Cách 2: Nếu cách 1 chưa có, quét sâu vào bộ nhớ đệm
                    if (!sceneName && window.tdvplayer) {
                        for (var key in window.tdvplayer) {
                            if (window.tdvplayer[key] && window.tdvplayer[key].currentMedia) {
                                sceneName = window.tdvplayer[key].currentMedia.media.name;
                                break;
                            }
                        }
                    }

                    // Cập nhật URL nếu tìm thấy tên
                    if (sceneName && sceneName !== window.lastScene) {
                        window.lastScene = sceneName;
                        var newUrl = window.location.origin + window.location.pathname + '?scene=' + encodeURIComponent(sceneName);
                        window.history.replaceState(null, '', newUrl);
                        document.getElementById('debug').style.display = 'none';
                    }
                } catch (e) {
                    // Im lặng để không làm treo Console
                }
            }, 2000);
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        #debug { position: fixed; top: 10px; left: 10px; color: #00ff00; background: rgba(0,0,0,0.8); padding: 10px; z-index: 9999; font-family: sans-serif; font-size: 11px; border: 1px solid #00ff00; border-radius: 4px; }
    </style>
</head>
<body onload="loadTour()">
    <div id="debug">🔍 Đang dò tìm tọa độ Pà Cò...</div>
    <div id="viewer"></div>
</body>
</html>
