<!DOCTYPE html>
<html>
<head>
    <title>Untitled 1</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />

    <script src="lib/tdvplayer.js?v=1773937233406"></script>

    <script type="text/javascript">
        var player;
        var playersPlayingTmp = [];
        var isInitialized = false;
        var isPaused = false;

        function loadTour()
        {
            if(player) return;

            var beginFunc = function(event){
                if(event.sourceClassName == "MediaAudio") return;

                isInitialized = true;
                disposePreloader();
                onVirtualTourLoaded();
            };

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');

            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            player.bind('stateChange', beginFunc, player, true);

            player.bindOnObject('rootPlayer', 'start', function(){
                var root = player.getById('rootPlayer');
                if(root) {
                    root.setMainMediaByIndex(0);
                }
            });
        }

        function getSceneFromURL() {
            var params = {};
            location.search.substr(1).split("&").forEach(function(item) {
                if (!item) return;
                var parts = item.split("=");
                params[parts[0]] = decodeURIComponent(parts[1]);
            });
            return params.scene;
        }

        function onVirtualTourLoaded()
        {
            if(isPaused) pauseTour();

            // 🔥 FIX QUAN TRỌNG NHẤT
            var scene = getSceneFromURL();

            if (scene) {
                var index = parseInt(scene) - 1;

                if (!isNaN(index)) {
                    setTimeout(function(){
                        var root = player.getById('rootPlayer');
                        if(root){
                            root.setMainMediaByIndex(index);
                            console.log("Loaded scene:", index);
                        }
                    }, 800);
                }
            }
        }

        function pauseTour(){}

        function disposePreloader()
        {
            var preloadContainer = document.getElementById('preloadContainer');
            if(preloadContainer){
                preloadContainer.style.display = 'none';
            }
        }

        function onLoad() {
            loadTour();
        }
    </script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }
        #viewer {
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body onload="onLoad()">
    <div id="preloadContainer" style="background:#fff;position:absolute;width:100%;height:100%;z-index:2;text-align:center;padding-top:20%;">
        Loading virtual tour...
    </div>
    <div id="viewer"></div>
</body>
</html>
