<!DOCTYPE html>
<html>
<head>
    <title>Untitled 1</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />

    <script src="lib/tdvplayer.js?v=1773937233406"></script>

    <script type="text/javascript">
        var player;
        var isInitialized = false;

        function loadTour()
        {
            if(player) return;

            var beginFunc = function(){
                isInitialized = true;
                onVirtualTourLoaded();
            };

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');

            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            player.bind('stateChange', beginFunc, player, true);
        }

        // 🔥 ĐỌC URL
        function getSceneIndex() {
            var params = {};
            location.search.substr(1).split("&").forEach(function(item) {
                if (!item) return;
                var parts = item.split("=");
                params[parts[0]] = decodeURIComponent(parts[1]);
            });

            if (!params.scene) return null;

            var index = parseInt(params.scene) - 1;
            return isNaN(index) ? null : index;
        }

        // 🔥 FIX CHÍNH Ở ĐÂY
        function onVirtualTourLoaded()
        {
            var index = getSceneIndex();
            if (index === null) return;

            // lấy playlist thật
            var playLists = player.getByClassName('PlayList');

            if (playLists.length > 0) {
                var playList = playLists[0];

                // delay để tránh bị ghi đè
                setTimeout(function(){
                    playList.set('selectedIndex', index);
                    console.log("Loaded scene index:", index);
                }, 1000);
            }
        }

        function onLoad() {
            loadTour();
        }
    </script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }
        #viewer {
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body onload="onLoad()">
    <div id="viewer"></div>
</body>
</html>
