<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            player.bindOnObject('rootPlayer', 'start', function(e){
                var lastMediaName = "";
                
                var checkSystem = setInterval(function() {
                    try {
                        var rp = player.getById('rootPlayer');
                        if (!rp) return; // Đợi đến khi rootPlayer thực sự tồn tại

                        var panoPlayer = rp.get('MainviewerPanoramaPlayer');
                        if (!panoPlayer) return; // Đợi Panorama Player sẵn sàng

                        var currentMedia = panoPlayer.get('currentMedia');
                        if (!currentMedia) return;

                        var media = currentMedia.get('media');
                        var name = media.get('name') || media.get('label');

                        if (name && name !== lastMediaName) {
                            lastMediaName = name;
                            var newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?scene=' + encodeURIComponent(name);
                            window.history.replaceState(null, '', newUrl);
                            document.getElementById('debug').style.display = "none"; // Ẩn thông báo khi đã chạy ngon
                        }
                    } catch (err) {
                        // Giữ im lặng để hệ thống tự load ngầm
                    }
                }, 1500); // Tăng thời gian giãn cách để tránh quá tải trình duyệt
            }, player, false);
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        #debug { position: fixed; top: 10px; left: 10px; color: #00ff00; background: rgba(0,0,0,0.8); padding: 10px; z-index: 9999; font-family: sans-serif; font-size: 12px; border: 1px solid #00ff00; border-radius: 4px; pointer-events: none; }
    </style>
</head>
<body onload="loadTour()">
    <div id="debug">🚀 Đang kết nối dữ liệu Pà Cò...</div>
    <div id="viewer"></div>
</body>
</html>
