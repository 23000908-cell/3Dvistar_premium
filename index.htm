<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // Bắt sự kiện chuyển cảnh từ lõi của 3DVista
            player.bindOnObject('rootPlayer', 'currentMediaName_changed', function() {
                try {
                    var rp = player.getById('rootPlayer');
                    // Lấy tên cảnh trực tiếp từ thuộc tính currentMediaName
                    var sceneName = rp.get('currentMediaName');
                    
                    if (sceneName) {
                        var newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?scene=' + encodeURIComponent(sceneName);
                        window.history.replaceState(null, '', newUrl);
                    }
                } catch (e) {
                    console.log("Đang tải cảnh...");
                }
            });
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    </style>
</head>
<body onload="loadTour()">
    <div id="viewer"></div>
</body>
</html>
