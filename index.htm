<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // Vòng lặp quét liên tục với độ trễ thấp
            setInterval(function() {
                try {
                    // Chọc đúng vào cái "số 5" mà Toàn đã tìm ra
                    var rp = player.getById('rootPlayer');
                    if (rp && rp.mainPlayList) {
                        var list = rp.mainPlayList;
                        var idx = list.get('selectedIndex');
                        var items = list.get('items');
                        
                        if (items && items[idx]) {
                            var media = items[idx].get('media');
                            // Thử lấy Name, nếu không có thì lấy Label
                            var sceneName = media.get('name') || media.get('label');

                            if (sceneName && sceneName !== window.lastScene) {
                                window.lastScene = sceneName;
                                // Ép URL phải thay đổi ngay lập tức
                                window.location.hash = "scene=" + encodeURIComponent(sceneName);
                            }
                        }
                    }
                } catch (e) {
                    // Bỏ qua lỗi nếu tour chưa sẵn sàng
                }
            }, 1000); // Quét mỗi giây 1 lần
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    </style>
</head>
<body onload="loadTour()">
    <div id="viewer"></div>
</body>
</html>
