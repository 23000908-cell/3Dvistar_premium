<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        // BẢO MẬT: CHẶN CHUỘT PHẢI
        document.addEventListener('contextmenu', event => event.preventDefault());

        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            player.bindOnObject('rootPlayer', 'start', function() {
                var rp = player.getById('rootPlayer');
                var list = rp.mainPlayList;
                
                var hash = window.location.hash;
                if (hash.indexOf('#scene=') !== -1) {
                    var targetScene = decodeURIComponent(hash.replace('#scene=', ''));
                    var items = list.get('items');
                    for (var i = 0; i < items.length; i++) {
                        var media = items[i].get('media');
                        if (media.get('name') === targetScene || media.get('label') === targetScene) {
                            list.set('selectedIndex', i); 
                            break;
                        }
                    }
                }

                // VÒNG LẶP LIÊN TỤC SỬA LỖI & CẬP NHẬT LINK
                setInterval(function() {
                    // 1. Cập nhật URL khi đổi cảnh
                    try {
                        var idx = list.get('selectedIndex');
                        var currentMedia = list.get('items')[idx].get('media');
                        var sceneName = currentMedia.get('name') || currentMedia.get('label');
                        if (sceneName && sceneName !== window.lastScene) {
                            window.lastScene = sceneName;
                            window.location.hash = "scene=" + encodeURIComponent(sceneName);
                        }
                    } catch (e) {}

                    // 2. JS ĐẶC TRỊ LỖI CHỮ "THREADS OF HERITAGE"
                    try {
                        // Xử lý nếu logo là đoạn Text
                        var textElements = document.querySelectorAll('#viewer div, #viewer span');
                        for (var i = 0; i < textElements.length; i++) {
                            var textContent = textElements[i].innerText || textElements[i].textContent;
                            if (textContent && textContent.includes('Threads of Heritage')) {
                                textElements[i].style.maxWidth = '90vw'; /* Ép rộng tối đa 90% màn hình */
                                textElements[i].style.whiteSpace = 'normal'; /* Cho phép rớt xuống dòng nếu dài quá */
                                textElements[i].style.wordBreak = 'break-word';
                            }
                        }
                        // Xử lý nếu logo là hình Ảnh
                        var imgElements = document.querySelectorAll('#viewer img');
                        for (var j = 0; j < imgElements.length; j++) {
                            imgElements[j].style.maxWidth = '90vw';
                            imgElements[j].style.objectFit = 'contain';
                        }
                    } catch (e) {}

                }, 500); // Chạy lệnh mỗi nửa giây để đảm bảo 3DVista không tự làm tràn chữ lại
            });
        }
    </script>
    <style type="text/css">
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #000; 
            -webkit-user-select: none; user-select: none;
        }

        /* Giao diện 100% chuẩn, không bóp méo tour */
        #viewer { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; z-index: 1;
        }
    </style>
</head>
<body onload="loadTour()">
    <div id="viewer"></div>
</body>
</html>
