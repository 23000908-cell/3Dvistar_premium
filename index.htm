<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // CÁCH CHỐT HẠ: Lấy thẳng dữ liệu từ bộ nhớ đệm của Player
            setInterval(function() {
                try {
                    // Quét trực tiếp vào đối tượng đang hiển thị trên màn hình
                    var currentScene = player.getById('rootPlayer').getActiveView().get('media').get('name');
                    
                    if (currentScene && currentScene !== window.lastScene) {
                        window.lastScene = currentScene;
                        // Tạo link dạng: .../index.htm#scene=TenCanh
                        window.location.hash = "scene=" + currentScene;
                    }
                } catch (e) {
                    // Nếu cách trên lỗi, thử lấy qua Label
                    try {
                        var label = player.getById('rootPlayer').getActiveView().get('media').get('label');
                        if (label) window.location.hash = "scene=" + encodeURIComponent(label);
                    } catch (err) {}
                }
            }, 1500);
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    </style>
</head>
<body onload="loadTour()">
    <div id="viewer"></div>
</body>
</html>
