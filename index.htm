<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <script src="lib/tdvplayer.js?v=1774121477535"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1774121477535');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // Vòng lặp lấy tên cảnh theo cách đơn giản nhất
            setInterval(function() {
                try {
                    // Thử lấy qua hàm API chuẩn
                    var media = player.getCurrentMedia();
                    var name = media ? (media.name || media.label) : null;
                    
                    if (name && name !== window.lastSceneName) {
                        window.lastSceneName = name;
                        var newUrl = window.location.origin + window.location.pathname + '?scene=' + encodeURIComponent(name);
                        window.history.replaceState(null, '', newUrl);
                        document.getElementById('debug').style.display = 'none';
                    }
                } catch (e) {
                    // Nếu lỗi, thử tìm trong danh sách Objects (phương án dự phòng)
                    var objs = player.getObjects();
                    for(var i in objs) {
                        if(objs[i] && objs[i].hasOwnProperty('currentMedia')) {
                            var n = objs[i].get('currentMedia').get('media').get('name');
                            if(n) { /* Cập nhật URL tại đây */ }
                        }
                    }
                }
            }, 2000);
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        #debug { position: fixed; top: 10px; left: 10px; color: #00ff00; background: rgba(0,0,0,0.8); padding: 10px; z-index: 9999; font-family: sans-serif; font-size: 11px; border: 1px solid #00ff00; border-radius: 4px; pointer-events: none; }
    </style>
</head>
<body onload="loadTour()">
    <div id="debug">📡 Đang kết nối không gian Pà Cò...</div>
    <div id="viewer"></div>
</body>
</html>
