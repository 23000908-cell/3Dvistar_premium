<!DOCTYPE html>
<html>
<head>
    <title>3DVista Tour - URL Fixed</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        var isInitialized = false;
        var lastMediaName = ""; // Biến để theo dõi tên ảnh hiện tại

        function loadTour() {
            if(player) return;

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            player.bind('preloadMediaShow', function() {
                isInitialized = true;
                var preload = document.getElementById('preloadContainer');
                if(preload) preload.style.display = 'none';

                // --- CƠ CHẾ "CƯỠNG CHẾ" CẬP NHẬT URL (MỖI 500MS) ---
                setInterval(function() {
                    var root = window.tdvplayer ? window.tdvplayer.getById('rootPlayer') : null;
                    if (root) {
                        var currentMedia = root.get('mainMedia');
                        if (currentMedia) {
                            var mediaName = currentMedia.get('media').get('name');
                            // Nếu tên ảnh vừa đổi so với lần kiểm tra trước
                            if (mediaName !== lastMediaName) {
                                lastMediaName = mediaName;
                                var newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?media-name=' + encodeURIComponent(mediaName);
                                window.history.replaceState(null, '', newUrl);
                                console.log("Đã cập nhật URL sang: " + mediaName);
                            }
                        }
                    }
                }, 500); 
            }, player, true);

            // Đọc URL khi bắt đầu vào tour
            player.bindOnObject('rootPlayer', 'start', function(e) {
                var urlParams = new URLSearchParams(window.location.search);
                var mName = urlParams.get('media-name');
                if (mName) {
                    var root = window.tdvplayer.getById('rootPlayer');
                    root.setMainMediaByName(mName);
                }
            }, player, false);
        }

        function onLoad() { loadTour(); }
    </script>
    <style type="text/css">
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { position:absolute; width: 100%; height: 100%; top: 0; }
        #preloadContainer { z-index:2; position:relative; width:100%; height:100%; background-color: #fff; display: flex; align-items: center; justify-content: center; font-family: Arial; }
    </style>
</head>
<body onload="onLoad()">
    <div id="preloadContainer">Đang tải Tour 360...</div>
    <div id="viewer"></div>
</body>
</html>
