<!DOCTYPE html>
<html>
<head>
    <title>3DVista Tour</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // Đoạn này giúp tour biến mất màn hình chờ khi tải xong
            player.bind('preloadMediaShow', function() {
                var preload = document.getElementById('preloadContainer');
                if(preload) { preload.style.opacity = 0; setTimeout(function(){ preload.style.display = 'none'; }, 500); }
            }, player, true);

            // --- ĐOẠN CODE THEO DÕI URL (KHÔNG GÂY TREO) ---
            player.bindOnObject('rootPlayer', 'start', function(e) {
                // 1. Kiểm tra link lúc mới vào
                var mName = new URLSearchParams(window.location.search).get('media-name');
                if (mName) { player.getById('rootPlayer').setMainMediaByName(mName); }

                // 2. Theo dõi thay đổi cảnh để đổi URL
                setInterval(function() {
                    var root = player.getById('rootPlayer');
                    var current = root ? root.get('mainMedia') : null;
                    if (current) {
                        var name = current.get('media').get('name');
                        if (!window.location.search.includes(name)) {
                            window.history.replaceState(null, '', '?media-name=' + encodeURIComponent(name));
                        }
                    }
                }, 1000);
            }, player, false);
        }
    </script>
    <style type="text/css">
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { position:absolute; width: 100%; height: 100%; top: 0; }
        #preloadContainer { z-index:2; position:relative; width:100%; height:100%; background-color: #fff; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; font-family: Arial; }
    </style>
</head>
<body onload="loadTour()">
    <div id="preloadContainer">Đang tải Tour 360...</div>
    <div id="viewer"></div>
</body>
</html>
