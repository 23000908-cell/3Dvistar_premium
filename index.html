<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <script>(function(i,s,o,g,r,a,m){i["GoogleAnalyticsObject"]=r;i[r]=i[r]||function(){(i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)})(window,document,"script","//www.google-analytics.com/analytics.js","ga");ga("create", "UA-116087-3", "auto"); ga("send", "pageview");</script>
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        var isInitialized = false;
        function loadTour() {
            if(player) return;
            var beginFunc = function(event){
                if(event.name == 'begin') {
                    var camera = event.data.source.get('camera');
                    if(camera && camera.get('initialSequence') && camera.get('initialSequence').get('movements').length > 0) return;
                }
                isInitialized = true;
                player.unbind('preloadMediaShow', beginFunc, player, true);
                disposePreloader();
            };
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1773937233406');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);
            player.bind('preloadMediaShow', beginFunc, player, true);
            player.bind('stateChange', beginFunc, player, true);
        }
        function disposePreloader() {
            var p = document.getElementById('preloadContainer');
            if(p) { p.style.opacity = 0; setTimeout(function(){ p.style.display = 'none'; }, 500); }
        }
        function onLoad() { loadTour(); }
    </script>
    <style type="text/css">
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { position:absolute; width: 100%; height: 100%; top: 0; z-index:1; }
        #preloadContainer { z-index:2; position:relative; width:100%; height:100%; background-color: #fff; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; font-family: Arial; }
    </style>
</head>
<body onload="onLoad()">
    <div id="preloadContainer">Đang tải tour Pà Cò...</div>
    <div id="viewer"></div>

    <script type="text/javascript">
        (function() {
            var lastUpdate = "";
            setInterval(function() {
                try {
                    if (window.tdvplayer) {
                        var root = window.tdvplayer.getById('rootPlayer');
                        if (root && root.get('mainMedia')) {
                            var media = root.get('mainMedia').get('media');
                            var name = media.get('label') || media.get('name');
                            if (name && name !== lastUpdate) {
                                lastUpdate = name;
                                var newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?media-name=' + encodeURIComponent(name);
                                window.history.replaceState(null, '', newUrl);
                            }
                        }
                    }
                } catch (e) {}
            }, 2000);
        })();
    </script>
</body>
</html>
