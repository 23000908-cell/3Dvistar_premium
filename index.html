    <meta name="description" content="Virtual Tour"/>
    <meta name="theme-color" content="#FFFFFF"/>
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        var playersPlayingTmp = [];
        var isInitialized = false;
        var isPaused = false;

        function loadTour() {
            if(player) return;
            var beginFunc = function(event){
                if(event.name == 'begin') {
                    var camera = event.data.source.get('camera');
                    if(camera && camera.get('initialSequence') && camera.get('initialSequence').get('movements').length > 0) return;
                }
                if(event.sourceClassName == "MediaAudio") return;
                isInitialized = true;
                player.unbind('preloadMediaShow', beginFunc, player, true);
                player.unbindOnObjectsOf('PanoramaPlayListItem', 'begin', beginFunc, player, true);
                player.unbind('stateChange', beginFunc, player, true);
                window.parent.postMessage("tourLoaded", '*');
                disposePreloader();
                onVirtualTourLoaded();
            };

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1773937233406');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);
            player.bind('preloadMediaShow', beginFunc, player, true);
            player.bind('stateChange', beginFunc, player, true);
            player.bindOnObjectsOf('PanoramaPlayListItem', 'begin', beginFunc, player, true);
            player.bindOnObject('rootPlayer', 'start', function(e){
                var queryDict = {}; location.search.substr(1).split("&").forEach(function(item) {var k = item.split("=")[0], v = decodeURIComponent(item.split("=")[1]);queryDict[k] = v});
                var item = undefined;
                if("media-index" in queryDict){ item = setMediaByIndex(parseInt(queryDict["media-index"]) - 1); }
                else if("media-name" in queryDict){ item = setMediaByName(queryDict["media-name"]); }
                else{ item = setMediaByIndex(0); }
                player.getById('rootPlayer').bind('tourEnded', function(){ onVirtualTourEnded(); }, player, true);
            }, player, false);

            window.addEventListener('message', function (e) {
                var action = e.data;
                if (action == 'pauseTour' || action == 'resumeTour') { this[action].apply(this); }
            });
        }

        function pauseTour() {
            isPaused = true;
            if(!isInitialized) return;
            var playLists = player.getByClassName('PlayList');
            for(var i = 0, count = playLists.length; i<count; i++) {
                var playList = playLists[i];
                var index = playList.get('selectedIndex');
                if(index != -1) {
                    var item = playList.get('items')[index];
                    var itemPlayer = item.get('player');
                    if(itemPlayer && itemPlayer.pause) { playersPlayingTmp.push(itemPlayer); itemPlayer.pause(); }
                }
            }
            player.getById('pauseGlobalAudios')();
        }

        function resumeTour() {
            isPaused = false;
            if(!isInitialized) return;
            while(playersPlayingTmp.length) { var viewer = playersPlayingTmp.pop(); viewer.play(); }
            player.getById('resumeGlobalAudios')();
        }

        function onVirtualTourLoaded() { if(isPaused) pauseTour(); }
        function onVirtualTourEnded() {}
        function getRootPlayer() { return window.tdvplayer !== undefined ? window.tdvplayer.getById('rootPlayer') : undefined; }
        function setMediaByIndex(index) { var rootPlayer = getRootPlayer(); if(rootPlayer !== undefined) { return rootPlayer.setMainMediaByIndex(index); } }
        function setMediaByName(name) { var rootPlayer = getRootPlayer(); if(rootPlayer !== undefined) { return rootPlayer.setMainMediaByName(name); } }

        function showPreloader() { var p = document.getElementById('preloadContainer'); if(p != undefined) p.style.opacity = 1; }

        function disposePreloader() {
            var p = document.getElementById('preloadContainer');
            if(p == undefined) return;
            p.style.opacity = 0;
            setTimeout(function(){ p.style.visibility = 'hidden'; p.style.display = 'none'; }, 500);
        }

        function onLoad() {
            showPreloader();
            loadTour();
        }

        function isOVRWeb(){ return window.location.hash.substring(1).split('&').indexOf('ovrweb') > -1; }
    </script>
    <style type="text/css">
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }

    </style>

<body onload="onLoad()">
    <div id="preloadContainer">
        <div style="z-index: 4; position: absolute; left: 0%; top: 50%; width: 100.00%; height: 10.00%">
            <div style="text-align:center; color:#777; font-size:1.39vmin; font-family:Arial;">Loading virtual tour Pà Cò...</div>
        </div>
    </div>
    <div id="viewer"></div>

    <script type="text/javascript">
        (function() {
            var lastMedia = "";
            // Kiểm tra mỗi 2 giây để không làm nặng trình duyệt
            setInterval(function() {
                try {
                    if (window.tdvplayer) {
                        var root = window.tdvplayer.getById('rootPlayer');
                        if (root && root.get('mainMedia')) {
                            var media = root.get('mainMedia').get('media');
                            // Ưu tiên lấy Nhãn (Label) bạn đặt trong 3DVista, nếu không có mới lấy Tên file (Name)
                            var currentName = media.get('label') || media.get('name');
                            
                            if (currentName && currentName !== lastMedia) {
                                lastMedia = currentName;
                                // Đổi URL trên thanh địa chỉ mà không tải lại trang
                                var newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?media-name=' + encodeURIComponent(currentName);
                                window.history.replaceState({path: newUrl}, '', newUrl);
                                console.log("Đã chuyển sang cảnh: " + currentName);
                            }
                        }
                    }
                } catch (e) {
                    // Im lặng nếu tour chưa load xong biến
                }
            }, 2000);
        })();
    </script>
</body>
