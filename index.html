<!DOCTYPE html>
<html>
<head>
    <title>Virtual Tour</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />

    <script src="lib/tdvplayer.js?v=1773937233406"></script>

    <script>
        var player;

        function loadTour()
        {
            if(player) return;

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js?v=1773937233406');

            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // ✅ 1. LOAD ẢNH TỪ URL
            player.bindOnObject('rootPlayer', 'start', function(){
                var params = new URLSearchParams(window.location.search);
                var root = player.getById('rootPlayer');

                if (params.has("media-index")) {
                    var index = parseInt(params.get("media-index")) - 1;
                    if (!isNaN(index)) root.setMainMediaByIndex(index);
                } else {
                    root.setMainMediaByIndex(0);
                }
            }, player);

            // ✅ 2. HOOK CHUYỂN ẢNH → UPDATE URL
            setTimeout(function(){
                var root = player.getById('rootPlayer');
                if (!root) {
                    console.log("❌ rootPlayer chưa load");
                    return;
                }

                var original = root.setMainMediaByIndex;

                root.setMainMediaByIndex = function(index){
                    var result = original.call(this, index);

                    var newUrl = window.location.pathname + "?media-index=" + (index + 1);
                    window.history.replaceState(null, null, newUrl);

                    console.log("✅ URL:", newUrl);

                    return result;
                };

                console.log("🔥 Hook thành công");
            }, 1500);
        }

        function onLoad(){
            loadTour();
        }
    </script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #viewer {
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>

<body onload="onLoad()">
    <div id="viewer"></div>
</body>
</html>
