<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <link rel="preload" href="script.js?v=1773937233406" as="script"/>
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        var isInitialized = false;

        function loadTour() {
            if(player) return;

            var beginFunc = function(event){
                isInitialized = true;
                player.unbind('preloadMediaShow', beginFunc, player, true);
                disposePreloader();
            };

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1773937233406');
            
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);
            player.bind('preloadMediaShow', beginFunc, player, true);

            // Tự động nhảy cảnh khi mở link có sẵn media-name
            player.bindOnObject('rootPlayer', 'start', function(e){
                var params = new URLSearchParams(window.location.search);
                var mName = params.get('media-name');
                if(mName){
                    player.getById('rootPlayer').setMainMediaByName(mName);
                }
            }, player, false);
        }

        function disposePreloader() {
            var preload = document.getElementById('preloadContainer');
            if(preload) {
                preload.style.opacity = 0;
                setTimeout(function(){ preload.style.display = 'none'; }, 500);
            }
        }
        function onLoad() { loadTour(); }
    </script>
    <style type="text/css">
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { position:absolute; width: 100%; height: 100%; top: 0; z-index:1; }
        #preloadContainer { z-index:2; position:relative; width:100%; height:100%; transition: opacity 0.5s; background-color: #fff; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="onLoad()">
    <div id="preloadContainer">Loading...</div>
    <div id="viewer"></div>

    <script type="text/javascript">
        (function() {
            var lastMediaName = "";
            // Đợi tour khởi động hẳn rồi mới bắt đầu theo dõi
            setTimeout(function() {
                setInterval(function() {
                    if (window.tdvplayer) {
                        var root = window.tdvplayer.getById('rootPlayer');
                        if (root && root.get('mainMedia')) {
                            var currentName = root.get('mainMedia').get('media').get('name');
                            
                            // Chỉ cập nhật nếu tên cảnh thực sự thay đổi
                            if (currentName !== lastMediaName) {
                                lastMediaName = currentName;
                                var newUrl = window.location.pathname + '?media-name=' + encodeURIComponent(currentName);
                                window.history.replaceState(null, '', newUrl);
                                console.log("Cảnh hiện tại: " + currentName);
                            }
                        }
                    }
                }, 1000); 
            }, 3000); // Tăng lên 3 giây cho chắc chắn
        })();
    </script>
</body>
</html>
