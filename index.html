<!DOCTYPE html>
<html>
<head>
    <title>Virtual Tour</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width" />

    <script src="lib/tdvplayer.js"></script>

    <script>
        var player;
        var currentIndex = -1;

        function loadTour()
        {
            if(player) return;

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js');

            player = TDV.PlayerAPI.create(settings);

            // ✅ Load ảnh theo URL
            player.bindOnObject('rootPlayer', 'start', function () {
                var params = new URLSearchParams(window.location.search);

                if (params.has("media-index")) {
                    var index = parseInt(params.get("media-index")) - 1;
                    player.getById('rootPlayer').setMainMediaByIndex(index);
                } else {
                    player.getById('rootPlayer').setMainMediaByIndex(0);
                }
            }, player);

            // ✅ SYNC URL (cách chắc chắn chạy)
            setInterval(function(){
                if (!player) return;

                var root = player.getById('rootPlayer');
                if (!root) return;

                var index = root.get('mainMediaIndex');

                if (index !== undefined && index !== currentIndex) {
                    currentIndex = index;

                    var newUrl = window.location.pathname + "?media-index=" + (index + 1);
                    window.history.replaceState(null, null, newUrl);

                    console.log("URL updated:", newUrl);
                }
            }, 500);
        }

        function onLoad() {
            loadTour();
        }
    </script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #viewer {
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body onload="onLoad()">
    <div id="viewer"></div>
</body>
</html>
