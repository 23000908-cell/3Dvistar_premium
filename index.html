<!DOCTYPE html>
<html>
<head>
    <title>Virtual Tour</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />

    <script src="lib/tdvplayer.js"></script>

    <script>
        var player;
        var currentIndex = -1;

        function loadTour()
        {
            if(player) return;

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js');
            settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js');
            settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js');

            player = TDV.PlayerAPI.create(settings);

            // ✅ Load ảnh từ URL khi mở
            player.bindOnObject('rootPlayer', 'start', function () {
                var params = new URLSearchParams(window.location.search);

                if (params.has("media-index")) {
                    var index = parseInt(params.get("media-index")) - 1;
                    var root = player.getById('rootPlayer');
                    if (root) root.setMainMediaByIndex(index);
                } else {
                    var root = player.getById('rootPlayer');
                    if (root) root.setMainMediaByIndex(0);
                }
            }, player);

            // ✅ SYNC URL (CHUẨN NHẤT)
            setInterval(function(){
                if (!player) return;

                var playLists = player.getByClassName('PlayList');
                if (!playLists || playLists.length === 0) return;

                var playList = playLists[0];
                var index = playList.get('selectedIndex');

                if (index !== -1 && index !== currentIndex) {
                    currentIndex = index;

                    var newUrl = window.location.pathname + "?media-index=" + (index + 1);
                    window.history.replaceState(null, null, newUrl);

                    console.log("URL updated:", newUrl);
                }
            }, 500);
        }

        function onLoad() {
            loadTour();
        }
    </script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #viewer {
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>

<body onload="onLoad()">
    <div id="viewer"></div>
</body>
</html>
