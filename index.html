<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <link rel="preload" href="script.js?v=1773937233406" as="script"/>
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        var playersPlayingTmp = [];
        var isInitialized = false;
        var isPaused = false;

        function loadTour() {
            if(player) return;
            var beginFunc = function(event){
                if(event.name == 'begin') {
                    var camera = event.data.source.get('camera');
                    if(camera && camera.get('initialSequence') && camera.get('initialSequence').get('movements').length > 0) return;
                }
                if(event.sourceClassName == "MediaAudio") return;
                isInitialized = true;
                player.unbind('preloadMediaShow', beginFunc, player, true);
                disposePreloader();
                onVirtualTourLoaded();
            };
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1773937233406');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);
            player.bind('preloadMediaShow', beginFunc, player, true);
            player.bind('stateChange', beginFunc, player, true);
        }

        function getRootPlayer() { return window.tdvplayer !== undefined ? window.tdvplayer.getById('rootPlayer') : undefined; }
        function setMediaByIndex(index) { var rootPlayer = getRootPlayer(); if(rootPlayer) return rootPlayer.setMainMediaByIndex(index); }
        function setMediaByName(name) { var rootPlayer = getRootPlayer(); if(rootPlayer) return rootPlayer.setMainMediaByName(name); }
        function disposePreloader() {
            var p = document.getElementById('preloadContainer');
            if(p) { p.style.opacity = 0; setTimeout(function(){ p.style.display = 'none'; }, 500); }
        }
        function onVirtualTourLoaded() {}
        function onLoad() { loadTour(); }
    </script>
    <style type="text/css">
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { position:absolute; width: 100%; height: 100%; top: 0; z-index:1; }
        #preloadContainer { z-index:2; position:relative; width:100%; height:100%; background-color: #fff; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body onload="onLoad()">
    <div id="preloadContainer">Loading tour...</div>
    <div id="viewer"></div>

    <script type="text/javascript">
        (function() {
            var lastUpdate = "";
            function updateURL() {
                try {
                    // Truy cập sâu vào lõi của 3DVista
                    if (window.tdvplayer && typeof window.tdvplayer.getById === 'function') {
                        var root = window.tdvplayer.getById('rootPlayer');
                        if (root) {
                            var mainMedia = root.get('mainMedia');
                            if (mainMedia) {
                                var mediaObj = mainMedia.get('media');
                                var currentName = mediaObj.get('label') || mediaObj.get('name');
                                
                                if (currentName && currentName !== lastUpdate) {
                                    lastUpdate = currentName;
                                    // Tạo URL mới sạch sẽ
                                    var newUrl = window.location.protocol + '//' + window.location.host + window.location.pathname + '?media-name=' + encodeURIComponent(currentName);
                                    window.history.replaceState({path: newUrl}, '', newUrl);
                                    console.log("URL Updated to: " + currentName);
                                }
                            }
                        }
                    }
                } catch (e) { /* Chờ tour load xong */ }
            }
            // Kiểm tra liên tục mỗi giây
            setInterval(updateURL, 1000);
        })();
    </script>
</body>
</html>
