<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <link rel="preload" href="script.js?v=1773937233406" as="script"/>
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1773937233406');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);
            
            player.bind('preloadMediaShow', function(){ 
                var loader = document.getElementById('preloadContainer');
                if(loader) { loader.style.opacity = 0; setTimeout(function(){ loader.style.display = 'none'; }, 500); }
            }, player, true);
        }
        function onLoad() { loadTour(); }
    </script>
    <style type="text/css">
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { position:absolute; width: 100%; height: 100%; top: 0; z-index:1; }
        #preloadContainer { z-index:2; position:relative; width:100%; height:100%; background-color: #fff; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body onload="onLoad()">
    <div id="preloadContainer">Đang khởi tạo Tour Pà Cò...</div>
    <div id="viewer"></div>

    <script type="text/javascript">
        (function() {
            var lastUpdate = "";
            setInterval(function() {
                // CHIẾN THUẬT VẠN NĂNG: Quét mọi ngóc ngách để lấy tên cảnh
                try {
                    var p = window.tdvplayer || window.player || (window.TDV && window.TDV.PlayerAPI && window.TDV.PlayerAPI.getById('rootPlayer'));
                    if (p) {
                        var root = p.getById ? p.getById('rootPlayer') : p;
                        var media = root.get('mainMedia');
                        if (media) {
                            var name = media.get('media').get('name'); // Lấy tên gốc
                            var label = media.get('media').get('label'); // Lấy nhãn bạn đặt
                            var finalName = label || name; // Ưu tiên nhãn riêng của Toàn

                            if (finalName && finalName !== lastUpdate) {
                                lastUpdate = finalName;
                                var newUrl = window.location.pathname + '?media-name=' + encodeURIComponent(finalName);
                                window.history.replaceState(null, '', newUrl);
                                console.log("Đã tìm thấy cảnh: " + finalName);
                            }
                        }
                    }
                } catch (err) { 
                    // Im lặng nếu chưa load xong
                }
            }, 800); // Kiểm tra nhanh hơn (0.8 giây)
        })();
    </script>
</body>
</html>
