<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <link rel="preload" href="script.js?v=1773937233406" as="script"/>
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        var isInitialized = false;

        function loadTour() {
            if(player) return;

            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1773937233406');
            
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            // Xử lý ẩn màn hình chờ khi tải xong
            player.bind('preloadMediaShow', function() {
                isInitialized = true;
                var preload = document.getElementById('preloadContainer');
                if(preload) {
                    preload.style.opacity = 0;
                    setTimeout(function(){ preload.style.display = 'none'; }, 500);
                }
            }, player, true);

            // --- BỘ XỬ LÝ URL RIÊNG CỦA TOÀN ---
            player.bindOnObject('rootPlayer', 'start', function(e) {
                // 1. Đọc URL để nhảy đúng ảnh khi mở link
                var mName = new URLSearchParams(window.location.search).get('media-name');
                if (mName) {
                    player.getById('rootPlayer').setMainMediaByName(mName);
                }

                // 2. Vòng lặp kiểm tra để đổi URL trên thanh địa chỉ
                setInterval(function() {
                    var root = player.getById('rootPlayer');
                    if (root && root.get('mainMedia')) {
                        var currentName = root.get('mainMedia').get('media').get('name');
                        var urlParams = new URLSearchParams(window.location.search);
                        // Chỉ cập nhật nếu tên ảnh khác với tên trên URL
                        if (urlParams.get('media-name') !== currentName) {
                            window.history.replaceState(null, '', '?media-name=' + encodeURIComponent(currentName));
                        }
                    }
                }, 1000); 
            }, player, false);
        }

        function onLoad() { loadTour(); }
    </script>
    <style type="text/css">
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { position:absolute; width: 100%; height: 100%; top: 0; }
        #preloadContainer { 
            z-index:2; position:relative; width:100%; height:100%; 
            background-color: #fff; display: flex; align-items: center; 
            justify-content: center; transition: opacity 0.5s; 
            font-family: Arial; font-size: 14px; color: #777;
        }
    </style>
</head>
<body onload="onLoad()">
    <div id="preloadContainer">Loading virtual tour. Please wait...</div>
    <div id="viewer"></div>
</body>
</html>
