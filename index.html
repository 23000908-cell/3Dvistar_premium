<!DOCTYPE html>
<html>
<head>
    <title>Threads of Heritage - Pà Cò</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="user-scalable=no, initial-scale=0.5, width=device-width, viewport-fit=cover" />
    <script src="lib/tdvplayer.js?v=1773937233406"></script>
    <script type="text/javascript">
        var player;
        function loadTour() {
            if(player) return;
            var settings = new TDV.PlayerSettings();
            settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
            settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js?v=1773937233406');
            window.tdvplayer = player = TDV.PlayerAPI.create(settings);

            player.bindOnObject('rootPlayer', 'start', function(e){
                // Thử nghiệm xem code có chạy không - nếu thấy thông báo này hiện lên là code đã nạp thành công
                console.log("Tour đã sẵn sàng!"); 
                
                var lastUrlName = "";
                setInterval(function() {
                    try {
                        var rp = player.getById('rootPlayer');
                        var currentMedia = rp.get('mainMedia').get('media');
                        var name = currentMedia.get('label') || currentMedia.get('name');

                        if (name && name !== lastUrlName) {
                            lastUrlName = name;
                            var newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?media-name=' + encodeURIComponent(name);
                            window.history.replaceState(null, '', newUrl);
                        }
                    } catch (err) {}
                }, 500); // Kiểm tra cực nhanh mỗi 0.5 giây
            }, player, false);
        }
    </script>
    <style type="text/css">
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    </style>
</head>
<body onload="loadTour()">
    <div id="viewer"></div>
</body>
</html>
